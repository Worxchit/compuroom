<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>compuroom - Computer Lab Equipment Registry</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>compuroom</h1>
    <p class="student-info">
      นาย วรชิต ดีไร่ &middot; รหัสนักศึกษา 68319010028 &middot; 30901-2008 กลุ่ม 2
    </p>
  </header>

  <main class="container">
    <section class="form-card">
      <h2 id="form-title">เพิ่มครุภัณฑ์ใหม่</h2>
      <form id="asset-form">
        <input type="hidden" id="asset-id" />
        <div class="form-row">
          <label>รหัสครุภัณฑ์ (Asset Code)</label>
          <input type="text" id="asset_code" required />
        </div>
        <div class="form-row">
          <label>ยี่ห้อ (Brand)</label>
          <input type="text" id="brand" required />
        </div>
        <div class="form-row">
          <label>รุ่น (Model)</label>
          <input type="text" id="model" required />
        </div>
        <div class="form-row">
          <label>CPU</label>
          <input type="text" id="cpu" />
        </div>
        <div class="form-row">
          <label>RAM</label>
          <input type="text" id="ram" />
        </div>
        <div class="form-row">
          <label>ห้อง (Room)</label>
          <input type="text" id="room" required />
        </div>
        <div class="form-row">
          <label>สถานะ (Status)</label>
          <select id="status">
            <option value="active">active</option>
            <option value="repair">repair</option>
            <option value="disposed">disposed</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit" id="submit-btn">บันทึก</button>
          <button type="button" id="cancel-btn" class="secondary">ยกเลิก</button>
        </div>
      </form>
    </section>

    <section class="table-card">
      <div class="table-header">
        <h2>รายการครุภัณฑ์</h2>
        <button id="refresh-btn">รีเฟรช</button>
      </div>
      <table id="assets-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Asset Code</th>
            <th>Brand</th>
            <th>Model</th>
            <th>CPU</th>
            <th>RAM</th>
            <th>Room</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="assets-tbody"></tbody>
      </table>
      <p id="empty-msg" class="empty-msg" hidden>ยังไม่มีข้อมูลครุภัณฑ์</p>
    </section>
  </main>

  <footer class="footer">
    <span id="health-status">กำลังตรวจสอบสถานะ API...</span>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
