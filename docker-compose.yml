services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: compuroom
      POSTGRES_PASSWORD: compuroom
      POSTGRES_DB: compuroom
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compuroom"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: compuroom
      PGPASSWORD: compuroom
      PGDATABASE: compuroom
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
